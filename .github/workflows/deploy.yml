name: ReliefMesh CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Rust Contract Tests ──────────────────────────────────────
  contracts:
    name: Soroban Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Victim Registry tests
        working-directory: contracts
        run: cargo test -p victim-registry --verbose

      - name: Run Shopkeeper Registry tests
        working-directory: contracts
        run: cargo test -p shopkeeper-registry --verbose

      - name: Run Clawback Controller tests
        working-directory: contracts
        run: cargo test -p clawback-controller --verbose

      - name: Run Relief Pool tests
        working-directory: contracts
        run: cargo test -p relief-pool --verbose

      - name: Build WASM artifacts
        working-directory: contracts
        run: |
          cargo build --target wasm32-unknown-unknown --release -p victim-registry
          cargo build --target wasm32-unknown-unknown --release -p shopkeeper-registry
          cargo build --target wasm32-unknown-unknown --release -p clawback-controller
          cargo build --target wasm32-unknown-unknown --release -p relief-pool

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasm
          path: contracts/target/wasm32-unknown-unknown/release/*.wasm

  # ─── Frontend Tests & Build ───────────────────────────────────
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
          NEXT_PUBLIC_SOROBAN_RPC: https://soroban-testnet.stellar.org

  # ─── Deploy to Testnet (on main branch only) ──────────────────
  deploy-contracts:
    name: Deploy Contracts to Testnet
    needs: [contracts, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.STELLAR_SECRET_KEY != ''
    steps:
      - uses: actions/checkout@v4

      - name: Install Stellar CLI
        run: |
          cargo install --locked stellar-cli --features opt

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: contract-wasm
          path: wasm/

      - name: Deploy to Testnet
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
        run: |
          stellar contract deploy \
            --wasm wasm/victim_registry.wasm \
            --network testnet \
            --source $STELLAR_SECRET_KEY
          # Additional deployments would follow here

  # ─── Frontend Deploy (Vercel) ─────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: [frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.VERCEL_TOKEN != ''
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'
